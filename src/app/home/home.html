<div class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden"
     style="background: #0a0a0f; padding-top: env(safe-area-inset-top);">

  <!-- Gradiente de fundo -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-0 left-0 right-0 h-96 opacity-30"
         style="background: radial-gradient(ellipse at 50% 0%, #c0392b 0%, transparent 70%);"></div>
    <div class="absolute bottom-0 left-1/4 w-64 h-64 rounded-full opacity-10 blur-3xl"
         style="background: #e74c3c;"></div>
  </div>

  <!-- Conteúdo -->
  <div class="relative z-10 w-full max-w-sm mx-auto px-6 text-center space-y-10">

    <!-- Ícone / Logo -->
    <div class="flex flex-col items-center gap-4">
      <div class="w-20 h-20 rounded-3xl flex items-center justify-center shadow-2xl"
           style="background: linear-gradient(135deg, #c0392b, #e74c3c);">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
            d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/>
        </svg>
      </div>
      <div>
        <h1 class="text-4xl font-bold tracking-tight text-white">
          Oi, Amor 🤍
        </h1>
        <p class="text-base mt-2" style="color: rgba(255,255,255,0.45);">
          Nosso cantinho das viagens
        </p>
      </div>
    </div>

    <!-- Frase especial -->
    <div class="rounded-2xl px-6 py-5 text-left"
         style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);">
      <p class="text-sm font-medium mb-1" style="color: rgba(255,255,255,0.35);">nossa frase</p>
      <p class="text-lg font-semibold text-white leading-snug">
        "Eu te amo em Libras ��🏻"
      </p>
    </div>

    <!-- Botão principal -->
    <button
      (click)="navigateToMap()"
      class="w-full py-4 rounded-2xl text-white font-semibold text-lg transition-all duration-200 active:scale-95 shadow-2xl"
      style="background: linear-gradient(135deg, #c0392b, #e74c3c); box-shadow: 0 8px 32px rgba(192,57,43,0.4);"
    >
      Ver nossos lugares ✈️
    </button>

    <!-- Dots decorativos -->
    <div class="flex justify-center gap-2 pb-4">
      <div class="w-1.5 h-1.5 rounded-full" style="background: rgba(255,255,255,0.15);"></div>
      <div class="w-6 h-1.5 rounded-full" style="background: rgba(192,57,43,0.6);"></div>
      <div class="w-1.5 h-1.5 rounded-full" style="background: rgba(255,255,255,0.15);"></div>
    </div>

  </div>
</div>
